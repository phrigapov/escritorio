<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e1e2e"/>

  <!-- Monitor body -->
  <rect x="6" y="7" width="20" height="13" rx="2" fill="#313244"/>
  <rect x="7" y="8" width="18" height="11" rx="1.5" fill="#cba6f7"/>

  <!-- Screen content: code lines -->
  <rect x="9" y="10" width="7" height="1.5" rx="0.75" fill="#1e1e2e" opacity="0.7"/>
  <rect x="9" y="12.5" width="10" height="1.5" rx="0.75" fill="#1e1e2e" opacity="0.5"/>
  <rect x="9" y="15" width="5" height="1.5" rx="0.75" fill="#1e1e2e" opacity="0.7"/>

  <!-- Stand -->
  <rect x="14" y="20" width="4" height="2.5" rx="1" fill="#45475a"/>
  <rect x="11" y="22" width="10" height="1.5" rx="0.75" fill="#45475a"/>

  <!-- Coffee cup -->
  <rect x="21" y="18" width="5" height="5" rx="1" fill="#f38ba8"/>
  <rect x="21.5" y="19" width="4" height="1.5" rx="0.5" fill="#fab387" opacity="0.6"/>
  <!-- Steam -->
  <path d="M23 17.5 Q23.5 16.5 23 15.5" stroke="#cdd6f4" stroke-width="0.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M24.5 17.5 Q25 16.5 24.5 15.5" stroke="#cdd6f4" stroke-width="0.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Cup handle -->
  <path d="M26 19.5 Q27.5 19.5 27.5 21 Q27.5 22.5 26 22.5" stroke="#fab387" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
